###############################################################################
#  CORE-Gateway — Docker Compose
#  Services :
#    - rtsp-proxy  : MediaMTX — passerelle RTSP/HLS/WebRTC (2 caméras robot)
#    - face-server : FastAPI  — Stockage Sécurisé (Faces, MyGES, Core State)
###############################################################################

services:

  # ─────────────────────────────────────────────────────────────────────────
  #  RTSP Proxy — MediaMTX
  # ─────────────────────────────────────────────────────────────────────────
  rtsp-proxy:
    image: bluenviron/mediamtx:latest
    container_name: bastet-rtsp-proxy
    restart: unless-stopped
    environment:
      - MTX_LOGLEVEL=info
      - MTX_WEBRTCADDRESS=:8889
      - MTX_WEBRTCICEUDPMUXADDRESS=:48189
      - MTX_WEBRTCICETCPMUXADDRESS=:48189
      - MTX_WEBRTCADDITIONALHOSTS=ha.arthonetwork.fr
      - MTX_HLSVARIANT=lowLatency
      - MTX_HLSSEGMENTCOUNT=7
      - MTX_HLSSEGMENTDURATION=1s
    volumes:
      - ./rtsp-proxy/mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "48554:8554"                     # RTSP
      - "127.0.0.1:48886:8888"           # HLS (local, proxifié par Caddy pour HTTPS)
      - "127.0.0.1:48890:8889/tcp"       # WebRTC Signaling (HTTP)
      - "48189:48189/udp"                # WebRTC ICE UDP
      - "48189:48189/tcp"                # WebRTC ICE TCP
      - "49997:9997"                     # API
    networks:
      - bastet-net

  # ─────────────────────────────────────────────────────────────────────────
  #  Face & State Server — FastAPI (HTTPS)
  # ─────────────────────────────────────────────────────────────────────────
  face-server:
    build:
      context: ./face-server
      dockerfile: Dockerfile
    container_name: bastet-face-server
    restart: unless-stopped
    environment:
      - FACES_DIR=/data/faces
      - API_TOKEN=${API_TOKEN:-your-api-token-here}
    volumes:
      - gateway-data:/data
      - ./face-server:/app
    ports:
      - "127.0.0.1:44887:44888"
    networks:
      - bastet-net
    # HTTP healthcheck
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:44888/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  gateway-data:
    driver: local
    name: bastet-gateway-data

# ─── Réseau partagé ───────────────────────────────────────────────────────────
networks:
  bastet-net:
    name: bastet-net
    driver: bridge
