<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" stroke="url(#gold)" stroke-width="3"/>

  <!-- Bastet cat silhouette -->
  <!-- Body -->
  <ellipse cx="100" cy="130" rx="35" ry="40" fill="#2d1f0f" stroke="#f59e0b" stroke-width="1.5"/>

  <!-- Head -->
  <circle cx="100" cy="85" r="32" fill="#3d2a15" stroke="#f59e0b" stroke-width="1.5"/>

  <!-- Left ear -->
  <polygon points="72,62 65,25 85,50" fill="#3d2a15" stroke="#f59e0b" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Left ear inner -->
  <polygon points="74,55 70,35 83,52" fill="#f59e0b" opacity="0.3"/>

  <!-- Right ear -->
  <polygon points="128,62 135,25 115,50" fill="#3d2a15" stroke="#f59e0b" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Right ear inner -->
  <polygon points="126,55 130,35 117,52" fill="#f59e0b" opacity="0.3"/>

  <!-- Eyes -->
  <ellipse cx="88" cy="82" rx="6" ry="7" fill="#f59e0b"/>
  <ellipse cx="112" cy="82" rx="6" ry="7" fill="#f59e0b"/>
  <!-- Pupils -->
  <ellipse cx="88" cy="82" rx="2.5" ry="5" fill="#1a1a2e"/>
  <ellipse cx="112" cy="82" rx="2.5" ry="5" fill="#1a1a2e"/>

  <!-- Nose -->
  <polygon points="100,92 97,96 103,96" fill="#f59e0b"/>

  <!-- Mouth -->
  <path d="M97,96 Q100,100 100,99 Q100,100 103,96" fill="none" stroke="#f59e0b" stroke-width="1.2"/>

  <!-- Whiskers left -->
  <line x1="55" y1="88" x2="78" y2="93" stroke="#f59e0b" stroke-width="0.8" opacity="0.6"/>
  <line x1="55" y1="95" x2="78" y2="95" stroke="#f59e0b" stroke-width="0.8" opacity="0.6"/>
  <!-- Whiskers right -->
  <line x1="145" y1="88" x2="122" y2="93" stroke="#f59e0b" stroke-width="0.8" opacity="0.6"/>
  <line x1="145" y1="95" x2="122" y2="95" stroke="#f59e0b" stroke-width="0.8" opacity="0.6"/>

  <!-- Ankh symbol (collar) -->
  <path d="M100,112 L100,130 M100,112 L94,118 M100,112 L106,118" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.4"/>
  <circle cx="100" cy="112" r="3" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.4"/>

  <!-- Decorative dots around head -->
  <circle cx="100" cy="42" r="2" fill="#f59e0b" opacity="0.5"/>
  <circle cx="120" cy="48" r="1.5" fill="#f59e0b" opacity="0.3"/>
  <circle cx="80" cy="48" r="1.5" fill="#f59e0b" opacity="0.3"/>
</svg>
